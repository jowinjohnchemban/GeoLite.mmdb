#
# File: .github/workflows/GeoLite.yml
# Description: Publish GeoLite.mmdb
#

name: Publish GeoLite.mmdb

permissions:
  contents: write
  actions: write

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "0 1 */3 * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download GeoLite.mmdb
        id: download
        env:
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
        run: |
          set -e

          if [ -z "$LICENSE_KEY" ]; then
            echo "Error: LICENSE_KEY secret is not set"
            exit 1
          fi

          mkdir -p upload

          echo "📥 Downloading GeoLite2 databases..."

          curl -fL --progress-bar \
            -o asn.tar.gz \
            "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN&license_key=${LICENSE_KEY}&suffix=tar.gz"

          curl -fL --progress-bar \
            -o city.tar.gz \
            "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${LICENSE_KEY}&suffix=tar.gz"

          curl -fL --progress-bar \
            -o country.tar.gz \
            "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${LICENSE_KEY}&suffix=tar.gz"

          echo "📦 Extracting archives..."

          tar -xzf asn.tar.gz
          cp -v GeoLite2-ASN*/*.mmdb upload/

          tar -xzf city.tar.gz
          cp -v GeoLite2-City*/*.mmdb upload/

          tar -xzf country.tar.gz
          cp -v GeoLite2-Country*/*.mmdb upload/

          ls -lah upload/

          [ -n "$(ls upload/*.mmdb 2>/dev/null)" ] || {
            echo "No .mmdb files found"
            exit 1
          }

          echo "TAG_NAME=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

          # Preserve files across checkout
          mkdir -p /tmp/geolite
          cp upload/*.mmdb /tmp/geolite/

          {
            echo "## 📊 Database Summary"
            echo
            ls -lh upload/*.mmdb | awk '{print "- **" $9 "**: " $5}'
            echo
            echo "**Total Size:** $(du -sh upload | cut -f1)"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✅ Download completed successfully"

      - name: Checkout download branch
        uses: actions/checkout@v4
        with:
          ref: download
          fetch-depth: 0
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to download branch
        id: push
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -f /tmp/geolite/*.mmdb .

          git add *.mmdb

          if git diff --cached --quiet; then
            echo "✅ Databases are up-to-date"
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📤 Pushing updates to download branch..."

          git commit -m "Update GeoLite databases - ${TAG_NAME}"
          git push origin download

          echo "changes=true" >> "$GITHUB_OUTPUT"

          echo "✅ Successfully pushed to download branch" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Releases
        if: steps.push.outputs.changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: GeoLite Databases - ${{ env.TAG_NAME }}
          body: |
            ## GeoLite2 Databases Update

            Release Date: ${{ env.TAG_NAME }}

            Included databases:
            - GeoLite2-ASN
            - GeoLite2-City
            - GeoLite2-Country

            Automatically updated from MaxMind.
          files: |
            /tmp/geolite/*.mmdb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove old Releases
        if: steps.push.outputs.changes == 'true'
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 2
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

